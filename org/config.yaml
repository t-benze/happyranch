# ── Skill eligibility policy ────────────────────────────────────────
# Additive inheritance: effective = (org ∪ team ∪ agent) minus denies.
# Deny wins over allow. Unknown skill ids produce validation warnings.

skills:
  org:
    allow:
      - hr:reflection
    deny: []
  teams: {}
  agents:
    product_lead:
      allow:
        - hr:manage-agent
        - hr:manage-repo
      deny: []
    engineering_manager:
      allow:
        - hr:manage-agent
        - hr:manage-repo
      deny: []
