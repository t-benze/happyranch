<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HappyRanch</title>
    <!-- Apply theme BEFORE first paint so there is no flash of mismatched theme.
         Mirrors the happyranch.theme key read by useTheme() in hooks/theme.ts.
         Light is the default; dark overrides only when explicitly persisted. -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('happyranch.theme');
          if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch(e) { /* storage unavailable */ }
      })();
    </script>
    <link rel="icon" href="/happyranch-favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-bg text-fg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
